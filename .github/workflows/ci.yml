name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@dde8c378815e47aa027c163278430c0d98ae007b
    with:
      node_versions: '["22"]'
      publish_node_version: "22"
      pnpm_version: "9.15.9"
      metadata_check_command: pnpm run check:release-metadata
      typecheck_command: pnpm run check
      unit_test_command: pnpm run test
      build_command: pnpm run build
      package_check_command: pnpm run check:package
      bazel_targets: "//:pkg //:typecheck //:test"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      dry_run: true
    secrets: inherit
