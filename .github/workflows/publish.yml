name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  actions: read
  contents: read
  id-token: write
  packages: write

jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@21e0093a7586931ee69d716387e00556c6da7738
    with:
      runner_mode: hosted
      workspace_mode: isolated
      publish_mode: same_runner
      node_versions: '["22"]'
      publish_node_version: "22"
      pnpm_version: "9.15.9"
      metadata_check_command: pnpm run check:release-metadata
      typecheck_command: pnpm run check
      unit_test_command: pnpm run test
      build_command: pnpm run build
      package_check_command: "pnpm run check:package && pnpm run check:bundle-size"
      bazel_targets: "//:pkg //:package_consumer_check //:bundle_size_check //:typecheck //:test"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      dry_run: false
    secrets: inherit
