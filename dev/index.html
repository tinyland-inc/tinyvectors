<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TinyVectors Dev</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			height: 100%;
			min-height: 100vh;
			min-height: 100dvh;
			font-family: system-ui, -apple-system, sans-serif;
			overflow: hidden;
		}
		html,
		body {
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
		}
		html.light,
		body.light {
			background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 50%, #d0d0d0 100%);
		}
		#app {
			position: fixed;
			inset: 0;
			width: 100%;
			height: 100vh;
			height: 100dvh;
		}
		.controls {
			position: fixed;
			top: 16px;
			right: 16px;
			z-index: 1000;
			width: min(282px, calc(100vw - 32px));
			max-height: calc(100vh - 32px);
			max-height: calc(100dvh - 32px);
			overflow: auto;
			background: rgba(6, 8, 18, 0.9);
			backdrop-filter: blur(14px);
			padding: 16px;
			border-radius: 8px;
			color: white;
			font-size: 14px;
			box-shadow: 0 16px 48px rgba(0, 0, 0, 0.32);
		}
		.controls label {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			align-items: center;
			gap: 8px;
			margin-bottom: 8px;
		}
		.controls .checkbox-row {
			grid-template-columns: auto minmax(0, 1fr);
			justify-content: start;
		}
		.controls .range-row {
			grid-template-columns: minmax(0, 1fr) minmax(118px, 1.2fr) auto;
		}
		.controls select, .controls input {
			padding: 4px 8px;
			border-radius: 4px;
			border: none;
			min-width: 0;
		}
		.controls select {
			max-width: 132px;
		}
		.controls input[type="range"] {
			width: 100%;
		}
		.controls input[type="checkbox"] {
			width: 14px;
			height: 14px;
			padding: 0;
		}
		.controls button {
			margin-top: 8px;
			padding: 8px 16px;
			border-radius: 4px;
			border: none;
			background: #5b8def;
			color: white;
			cursor: pointer;
		}
		.controls .button-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
		}
		.controls .button-row button {
			margin-top: 0;
			padding: 8px 10px;
		}
		.controls .status {
			display: block;
			margin-top: 8px;
			min-height: 18px;
			opacity: 0.75;
		}
		.controls button:hover {
			background: #4a7de0;
		}
		.hide-controls .controls {
			display: none;
		}
		/* Mobile responsive */
		@media (max-width: 720px) {
			.controls {
				top: 8px;
				left: 8px;
				right: auto;
				width: calc(100vw - 16px);
				max-height: calc(100vh - 16px);
				max-height: calc(100dvh - 16px);
				padding: 12px;
				font-size: 12px;
			}
			.controls h3 {
				font-size: 14px;
				margin-bottom: 8px;
			}
			.controls label {
				margin-bottom: 6px;
			}
			.controls select {
				width: min(132px, 40vw);
				max-width: 132px;
			}
			.controls .range-row {
				grid-template-columns: minmax(0, 1fr) minmax(96px, 36vw) auto;
			}
			.controls button {
				width: 100%;
				padding: 10px;
			}
			.controls .button-row {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body class="dark">
	<div id="app"></div>
	<div class="controls">
		<h3>TinyVectors Dev</h3>
		<label>
			<span>Theme:</span>
			<select id="theme-select">
				<option value="trans">Trans Pride</option>
				<option value="pride">Pride Rainbow</option>
				<option value="tinyland" selected>Tinyland</option>
			</select>
		</label>
		<label class="range-row">
			<span>Blob Count:</span>
			<input type="range" id="blob-count" min="4" max="16" value="8">
			<span id="blob-count-value">8</span>
		</label>
		<label class="checkbox-row">
			<input type="checkbox" id="dark-mode" checked>
			<span>Dark Mode</span>
		</label>
		<label class="checkbox-row">
			<input type="checkbox" id="animated" checked>
			<span>Animated</span>
		</label>
		<label class="checkbox-row">
			<input type="checkbox" id="pointer-physics" checked>
			<span>Pointer Physics</span>
		</label>
		<label class="checkbox-row">
			<input type="checkbox" id="scroll-physics" checked>
			<span>Scroll Physics</span>
		</label>
		<label class="checkbox-row">
			<input type="checkbox" id="device-motion" checked>
			<span>Device Motion</span>
		</label>
		<div class="button-row">
			<button id="request-motion-btn" type="button">Request Motion</button>
			<button id="calibrate-motion-btn" type="button">Calibrate</button>
		</div>
		<div class="button-row">
			<button id="spoof-tilt-btn" type="button">Spoof Tilt</button>
			<button id="neutral-tilt-btn" type="button">Neutral Tilt</button>
		</div>
		<span id="motion-status" class="status">motion idle</span>
		<button id="reload-btn">Reload</button>
	</div>
	<script type="module" src="./main.ts"></script>
</body>
</html>
